<!DOCTYPE html>
<html lang="pl">
<head>

  <title>Sklep — Koszyk</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="cart">
  <header>
    <a class="brand" href="/products.html">Sklep E2E</a>
