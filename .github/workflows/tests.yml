name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: testy integracyjne (Vitest + Testcontainers)
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pnpm musi być przed setup-node, żeby zadziałał cache: "pnpm".
      # Wersja pnpm jest brana z pola "packageManager" w package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Docker jest preinstalowany na ubuntu-latest — Testcontainers działają od ręki.
      - name: Testy integracyjne
        run: pnpm test:integration

  # Job 2: testy E2E (Playwright). Sharding rozkłada testy na 2 maszyny.
  e2e:
    runs-on: ubuntu-latest
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Instalacja przeglądarek Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Testy E2E (shard ${{ matrix.shard }}/2)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2
        env:
          CI: "true"

      # Raport HTML — zawsze (również przy porażce).
      - name: Upload raportu
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      # Trace/wideo/screenshoty — tylko przy porażce, do analizy w Trace Viewerze.
      - name: Upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
